---
# =============================================================================
# Lab Infrastructure Playbook
# Targets:
#   - lab-devtools : DevTools VM + Private Docker Registry + Pi-hole DNS
#   - lab-k8s      : RKE2 single-node cluster + Rancher + ArgoCD
# =============================================================================

- name: Apply common baseline to all hosts
  hosts: all
  roles:
    - role: common
      tags: common

- name: Configure DevTools VM
  hosts: devtools
  roles:
    - role: devtools
      tags: devtools
    - role: registry
      tags: registry
    - role: pihole
      tags: pihole

- name: Deploy RKE2 Kubernetes + Rancher + ArgoCD
  hosts: k8s_nodes
  roles:
    - role: rke2
      tags: rke2
    - role: rancher
      tags: rancher
    - role: argocd
      tags: argocd
