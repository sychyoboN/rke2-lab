---
# Private Docker Registry role
# Runs registry:2 as a Docker container with persistent storage
# Exposed on port 5000, configured as insecure for lab use

- name: Create registry data directory
  ansible.builtin.file:
    path: /opt/registry/data
    state: directory
    mode: '0755'

- name: Create registry config directory
  ansible.builtin.file:
    path: /opt/registry/config
    state: directory
    mode: '0755'

- name: Deploy registry configuration file
  ansible.builtin.copy:
    dest: /opt/registry/config/config.yml
    mode: '0644'
    content: |
      version: 0.1
      log:
        level: info
        formatter: text
      storage:
        filesystem:
          rootdirectory: /var/lib/registry
        delete:
          enabled: true
      http:
        addr: :5000
        headers:
          X-Content-Type-Options: [nosniff]
      health:
        storagedriver:
          enabled: true
          interval: 10s
          threshold: 3

- name: Create Docker Compose file for registry
  ansible.builtin.copy:
    dest: /opt/registry/docker-compose.yml
    mode: '0644'
    content: |
      version: "3.8"
      services:
        registry:
          image: registry:2
          container_name: lab-registry
          restart: always
          ports:
            - "{{ registry_port }}:5000"
          volumes:
            - ./data:/var/lib/registry
            - ./config/config.yml:/etc/docker/registry/config.yml:ro
          environment:
            REGISTRY_STORAGE_DELETE_ENABLED: "true"
          healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/v2/"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s

- name: Create registry systemd service (manages docker-compose)
  ansible.builtin.copy:
    dest: /etc/systemd/system/lab-registry.service
    mode: '0644'
    content: |
      [Unit]
      Description=Lab Private Docker Registry
      Requires=docker.service
      After=docker.service
      StartLimitIntervalSec=0

      [Service]
      Type=forking
      WorkingDirectory=/opt/registry
      ExecStart=/usr/bin/docker compose up -d
      ExecStop=/usr/bin/docker compose down
      RemainAfterExit=yes
      Restart=on-failure
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start registry service
  ansible.builtin.systemd:
    name: lab-registry
    state: started
    enabled: true

- name: Wait for registry to be healthy
  ansible.builtin.uri:
    url: "http://{{ registry_hostname }}:{{ registry_port }}/v2/"
    method: GET
    status_code: 200
  register: registry_health
  until: registry_health.status == 200
  retries: 12
  delay: 5

- name: Display registry info
  ansible.builtin.debug:
    msg:
      - "Registry running at: http://{{ registry_hostname }}:{{ registry_port }}"
      - "Test push: docker tag myimage {{ registry_hostname }}:{{ registry_port }}/myimage:latest"
      - "          docker push {{ registry_hostname }}:{{ registry_port }}/myimage:latest"
      - "Catalog:   curl http://{{ registry_hostname }}:{{ registry_port }}/v2/_catalog"
