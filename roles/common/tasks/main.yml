---
# Common baseline for all Rocky Linux lab VMs

- name: Set SELinux to permissive (required for RKE2/Docker in lab)
  ansible.posix.selinux:
    policy: targeted
    state: permissive

- name: Disable firewalld (use iptables managed by k8s/docker instead)
  ansible.builtin.systemd:
    name: firewalld
    state: stopped
    enabled: false
  ignore_errors: true

- name: Update all packages (This may take a while...)
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true

- name: Install common utilities
  ansible.builtin.dnf:
    name:
      - curl
      - wget
      - git
      - vim
      - bash-completion
      - net-tools
      - bind-utils
      - tar
      - unzip
      - jq
      - python3-pip
      - iptables
      - iptables-services
      - openssl
    state: present

- name: Enable and start iptables
  ansible.builtin.systemd:
    name: iptables
    state: started
    enabled: true

- name: Set timezone to UTC
  community.general.timezone:
    name: UTC

- name: Configure /etc/hosts entries for lab VMs
  ansible.builtin.blockinfile:
    path: /etc/hosts
    block: |
      {{ private_registry_host }}  lab-devtools lab-devtools.lab.local
      {{ k8s_host }}  lab-k8s lab-k8s.lab.local {{ rancher_hostname }}
    marker: "# {mark} LAB HOSTS"

- name: Ensure swap is disabled (required for Kubernetes)
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Remove swap from fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*?\sswap\s+.*)$'
    replace: '# \1'

- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/lab.conf
    content: |
      overlay
      br_netfilter
    mode: '0644'

- name: Set sysctl parameters for networking
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
    - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
    - { key: net.ipv4.ip_forward,                 value: "1" }
