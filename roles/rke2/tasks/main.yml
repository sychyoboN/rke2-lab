---
# RKE2 role: Install and configure RKE2 as a single-node control plane
# Also installs Helm and kubectl on this node for Rancher deployment

# ── Iptables ──────────────────────────────────────────────────────────────────
# Write the exact ruleset we want so rule order is controlled:
#   INPUT  — ACCEPT required ports first, then REJECT everything else
#   FORWARD — no REJECT; default ACCEPT policy lets RKE2/Calico manage it
# Using iptables-restore instead of iptables-save avoids capturing whatever
# stale/out-of-order rules happened to be in the kernel at run time.
- name: Write k8s node iptables ruleset
  ansible.builtin.copy:
    dest: /etc/sysconfig/iptables
    mode: '0600'
    content: |
      # Managed by Ansible - do not edit manually
      *filter
      :INPUT ACCEPT [0:0]
      :FORWARD ACCEPT [0:0]
      :OUTPUT ACCEPT [0:0]
      -A INPUT -m state --state RELATED,ESTABLISHED -j ACCEPT
      -A INPUT -p icmp -j ACCEPT
      -A INPUT -i lo -j ACCEPT
      -A INPUT -p tcp -m state --state NEW -m tcp --dport 22 -j ACCEPT
      -A INPUT -p tcp -m state --state NEW -m tcp --dport 80 -j ACCEPT
      -A INPUT -p tcp -m state --state NEW -m tcp --dport 443 -j ACCEPT
      -A INPUT -p tcp -m state --state NEW -m tcp --dport 6443 -j ACCEPT
      -A INPUT -p tcp -m state --state NEW -m tcp --dport 9345 -j ACCEPT
      -A INPUT -p tcp -m state --state NEW -m tcp --dport 10250 -j ACCEPT
      -A INPUT -p udp -m udp --dport 8472 -j ACCEPT
      -A INPUT -j REJECT --reject-with icmp-host-prohibited
      COMMIT

- name: Apply iptables ruleset
  ansible.builtin.command: iptables-restore /etc/sysconfig/iptables
  changed_when: true
  
- name: Disable nm-cloud-setup (causes networking issues with RKE2)
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - nm-cloud-setup.service
    - nm-cloud-setup.timer
  ignore_errors: true

- name: Create RKE2 config directory
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    mode: '0755'
    recurse: true

# ── RKE2 Configuration ────────────────────────────────────────────────────────
- name: Create RKE2 server config
  ansible.builtin.copy:
    dest: /etc/rancher/rke2/config.yaml
    mode: '0600'
    content: |
      # RKE2 single-node server configuration
      write-kubeconfig-mode: "0644"
      tls-san:
        - "{{ inventory_hostname }}"
        - "{{ inventory_hostname }}.lab"
        - "{{ ansible_host }}"
        - "{{ rancher_hostname }}"
      # Mirror all image pulls through private registry
      # (Images not in registry will fall back to public)
      # cluster-cidr: 10.42.0.0/16   # default
      # service-cidr: 10.43.0.0/16   # default
      node-label:
        - "role=master"
        - "node-type=single"

- name: Create private registry mirror config for RKE2 containerd
  ansible.builtin.copy:
    dest: /etc/rancher/rke2/registries.yaml
    mode: '0644'
    content: |
      mirrors:
        "{{ registry_mirror_url | regex_replace('http://', '') }}":
          endpoint:
            - "http://{{ registry_mirror_url | regex_replace('http://', '') }}"
      configs:
        "{{ registry_mirror_url | regex_replace('http://', '') }}":
          tls:
            insecure_skip_verify: true

# ── Install RKE2 ──────────────────────────────────────────────────────────────
- name: Download RKE2 install script
  ansible.builtin.get_url:
    url: https://get.rke2.io
    dest: /tmp/install-rke2.sh
    mode: '0755'

- name: Install RKE2 server
  ansible.builtin.command: /tmp/install-rke2.sh
  environment:
    INSTALL_RKE2_VERSION: "{{ rke2_version }}"
    INSTALL_RKE2_TYPE: "server"
    INSTALL_RKE2_METHOD: "tar"   # Bypass RPM repo (no centos/10 repo exists yet)
  args:
    creates: /usr/local/bin/rke2

- name: Enable and start rke2-server
  ansible.builtin.systemd:
    name: rke2-server
    state: started
    enabled: true

- name: Wait for RKE2 to be ready (up to 5 min)
  ansible.builtin.wait_for:
    path: /var/lib/rancher/rke2/server/node-token
    state: present
    timeout: 300

- name: Wait for kubeconfig to be created
  ansible.builtin.wait_for:
    path: /etc/rancher/rke2/rke2.yaml
    state: present
    timeout: 120

# ── kubectl + Helm on k8s node ────────────────────────────────────────────────
- name: Symlink rke2 kubectl to /usr/local/bin
  ansible.builtin.file:
    src: /var/lib/rancher/rke2/bin/kubectl
    dest: /usr/local/bin/kubectl
    state: link
    force: true

- name: Create .kube dir for ansible user
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0700'

- name: Copy kubeconfig for ansible user
  ansible.builtin.copy:
    src: /etc/rancher/rke2/rke2.yaml
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: Set KUBECONFIG in profile
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    line: 'export KUBECONFIG=/home/{{ ansible_user }}/.kube/config'
    state: present

- name: Add RKE2 bin to PATH for all users
  ansible.builtin.copy:
    dest: /etc/profile.d/rke2.sh
    content: |
      export PATH=$PATH:/var/lib/rancher/rke2/bin
    mode: '0644'

# ── Install Helm on k8s node ──────────────────────────────────────────────────
- name: Install Helm
  ansible.builtin.unarchive:
    src: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    validate_certs: false
    extra_opts:
      - "--strip-components=1"
      - "linux-amd64/helm"
    creates: /usr/local/bin/helm
    mode: '0755'

- name: Symlink helm into standard path for ansible
  ansible.builtin.file:
    src: /usr/local/bin/helm
    dest: /usr/bin/helm
    state: link

# ── Verify cluster ────────────────────────────────────────────────────────────
- name: Wait for all nodes to be Ready
  ansible.builtin.command: >
    /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml
    get nodes -o jsonpath='{.items[*].status.conditions[-1].type}'
  register: node_status
  until: "'Ready' in node_status.stdout"
  retries: 30
  delay: 10
  changed_when: false

- name: Display cluster node status
  ansible.builtin.command: >
    /var/lib/rancher/rke2/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml
    get nodes -o wide
  register: node_list
  changed_when: false

- name: Show cluster nodes
  ansible.builtin.debug:
    msg: "{{ node_list.stdout_lines }}"
